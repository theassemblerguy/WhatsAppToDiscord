name: ci-tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run Node unit tests
        run: npm test

      - name: Bundle with esbuild (release smoke)
        if: matrix.node == 24
        run: npm run bundle

      - name: Run bundled watchdog smoke (out.js, Unix)
        if: matrix.os != 'windows-latest' && matrix.node == 24
        run: |
          tmp="$(mktemp -d)"
          (cd "$tmp" && WA2DC_SMOKE_TEST=1 node "$GITHUB_WORKSPACE/out.js")

      - name: Run bundled watchdog smoke (out.js, Windows)
        if: matrix.os == 'windows-latest' && matrix.node == 24
        shell: pwsh
        run: |
          $tmp = Join-Path $env:RUNNER_TEMP ("wa2dc-bundle-smoke-" + [guid]::NewGuid().ToString())
          New-Item -ItemType Directory -Path $tmp | Out-Null
          Push-Location $tmp
          try {
            $env:WA2DC_SMOKE_TEST = "1"
            node "$env:GITHUB_WORKSPACE/out.js"
          }
          finally {
            Pop-Location
            Remove-Item -Recurse -Force $tmp -ErrorAction SilentlyContinue
          }

      - name: Build and smoke-test packaged binary
        if: matrix.node == 24
        run: npm run build:bin:smoke
