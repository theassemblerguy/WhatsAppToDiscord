name: Feature request
description: Suggest an idea or improvement for WA2DC
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion!

        Please keep it concrete and brief. Examples are helpful.
        Before filing, check docs and existing issues to avoid duplicates:
        - Docs: https://arespawn.github.io/WhatsAppToDiscord/
        - Issues: https://github.com/arespawn/WhatsAppToDiscord/issues

  - type: input
    id: goal
    attributes:
      label: What are you trying to do?
      description: One sentence is enough.
      placeholder: "I want to quickly identify bridge failures without reading full logs."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What is hard today, and why is it a problem?
      placeholder: |
        Today:
        Why this hurts:
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should WA2DC do instead?
      placeholder: |
        Add/change:
        Trigger/command:
        Result:
    validations:
      required: true

  - type: textarea
    id: use_cases
    attributes:
      label: Example workflow (optional)
      description: Step-by-step example of how you would use this.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
      description: Any other solutions/workarounds you considered?
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope / edge cases (optional)
      description: Any constraints, edge cases, or backwards-compatibility concerns we should consider?
    validations:
      required: false

  - type: dropdown
    id: willingness
    attributes:
      label: Are you willing to help implement this?
      options:
        - "Yes"
        - "No"
        - "Not sure"
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: Who would benefit most from this?
      options:
        - Most users
        - Some users
        - Niche case
        - Not sure
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context (optional)
      description: Mockups, screenshots, links, related issues, etc.
    validations:
      required: false
