name: Bug report
description: Help us fix a problem in WA2DC
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this.
        Keep it short if needed, but include enough detail for us to reproduce.

        **Security/Privacy:** Do **not** post your Discord bot token, WhatsApp QR codes, webhook URLs, phone numbers, or private chat content. Redact sensitive info in logs/screenshots.

        Docs (setup/commands/troubleshooting): https://arespawn.github.io/WhatsAppToDiscord/

  - type: checkboxes
    attributes:
      label: Before you submit
      options:
        - label: I searched existing issues and this hasn't been reported yet.
          required: true
        - label: I removed or redacted private data from logs/screenshots.
          required: true

  - type: dropdown
    id: install_method
    attributes:
      label: Installation method
      options:
        - Packaged release (GitHub Releases)
        - Docker
        - Source (npm / node)
        - Other
    validations:
      required: true

  - type: input
    id: wa2dc_version
    attributes:
      label: WA2DC version
      description: Release tag / Docker image tag / `package.json` version (for source builds).
      placeholder: "v2.1.4 / stable / v2.1.5-beta.2"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Quick environment snapshot. Keep unknown fields as `Not sure`.
      placeholder: |
        OS: Windows 11 / Ubuntu 24.04 / macOS 15
        CPU: x64 / arm64 / armv7
        Node.js: v24.0.0 (or N/A for packaged release)
        Started after upgrade?: Yes / No / Not sure
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What went wrong?
      description: 1-3 sentences describing the issue.
      placeholder: "After restarting WA2DC, messages from one WhatsApp chat stopped mirroring to Discord."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands/messages you used and what happened after each step.
      placeholder: |
        1. Start WA2DC
        2. Run `start <contact>` in #control-room
        3. Send a WhatsApp message
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected_vs_actual
    attributes:
      label: Expected vs actual
      placeholder: |
        Expected: Message appears in the mapped Discord channel.
        Actual: No Discord message appears, and terminal shows reconnect spam.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (recommended)
      description: Paste relevant lines from `terminal.log` and/or `logs.txt` (startup to failure). Redact private data.
      render: shell
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / screen recording (optional)
      description: Drag-and-drop images/videos here if it helps explain the issue.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context (optional)
      description: Anything else that might help (recent changes, whether it worked before, etc.).
    validations:
      required: false
